apiVersion: v1
kind: Service

metadata:
  name: nginx-clusterip-service

spec:
  # Service type ClusterIP exposes the service only inside the cluster
  type: ClusterIP

  # Selector tells the service which pods it should route traffic to
  selector:
    app: nginx

  # Defines the ports configuration for the service
  ports:
    # Protocol used for communication
    - protocol: TCP

      # Port exposed by the service inside the cluster
      port: 80

      # Port on the container where the application is running
      targetPort: 80
